<section class="py-24 bg-white overflow-hidden" id="solutions">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
    
    <div class="text-center mb-16">
      <h2 class="font-heading text-4xl font-extrabold text-[#0F172A] sm:text-5xl tracking-tight">
        {{ ts.t.transformation.title }}
      </h2>
      <p class="mt-4 text-lg font-body text-gray-500 max-w-2xl mx-auto leading-relaxed">
        {{ ts.t.transformation.desc }}
      </p>
    </div>

    <div class="relative w-full max-w-5xl mx-auto aspect-video rounded-2xl overflow-hidden shadow-2xl select-none group border border-gray-100 bg-gray-100">
      
      <img src="assets/images/sonrasi.jpeg" 
           class="absolute inset-0 w-full h-full object-cover z-0" 
           alt="Partalog AI - Sonrası">
      
      <div class="absolute top-6 right-6 bg-blue-600/90 backdrop-blur-md text-white px-4 py-2 rounded-lg text-sm font-heading font-bold uppercase tracking-wider shadow-lg z-10 border border-white/20">
        {{ ts.t.transformation.afterLabel }}
      </div>

      <div class="absolute inset-0 overflow-hidden border-r-4 border-white shadow-[5px_0_20px_rgba(0,0,0,0.3)] z-20"
           [style.width.%]="sliderValue">
        
        <img src="assets/images/oncesi.jpeg" 
             class="absolute inset-0 w-full h-full object-cover max-w-none" 
             style="width: 100vw; max-width: 100%; height: 100%;" 
             alt="Manuel Katalog - Öncesi">
        
        <div class="absolute top-6 left-6 bg-gray-900/80 backdrop-blur-md text-white px-4 py-2 rounded-lg text-sm font-heading font-bold uppercase tracking-wider shadow-lg border border-white/10">
           {{ ts.t.transformation.beforeLabel }}
        </div>
      </div>

      <div class="absolute inset-y-0 z-30 flex items-center justify-center pointer-events-none"
           [style.left.%]="sliderValue">
        <div class="w-12 h-12 bg-white rounded-full shadow-2xl flex items-center justify-center -ml-6 ring-4 ring-black/10 text-blue-600 transition-transform transform group-hover:scale-110">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 9l4-4 4 4m0 6l-4 4-4-4" />
          </svg>
        </div>
      </div>

      <input type="range" 
             min="0" max="100" 
             [value]="sliderValue" 
             (input)="updateSlider($event)" 
             class="absolute inset-0 w-full h-full opacity-0 cursor-ew-resize z-40">
    </div>

  </div>
</section>
